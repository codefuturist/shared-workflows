name: Docker Setup
description: Set up QEMU, Buildx, and login to container registries (GHCR + Docker Hub)

inputs:
  ghcr-username:
    description: GHCR username (typically github.actor)
    required: true
  ghcr-token:
    description: GHCR token (typically secrets.GITHUB_TOKEN)
    required: true
  dockerhub-username:
    description: Docker Hub username (skip Docker Hub login if empty)
    required: false
    default: ""
  dockerhub-token:
    description: Docker Hub token (skip Docker Hub login if empty)
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ inputs.ghcr-username }}
        password: ${{ inputs.ghcr-token }}

    - name: Login to Docker Hub
      if: inputs.dockerhub-username != '' && inputs.dockerhub-token != ''
      uses: docker/login-action@v3
      with:
        username: ${{ inputs.dockerhub-username }}
        password: ${{ inputs.dockerhub-token }}
