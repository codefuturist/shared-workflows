name: CI — Node.js

on:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version
        type: string
        default: "24"
      run-lint:
        description: Run lint & format check (pnpm check)
        type: boolean
        default: true
      run-typecheck:
        description: Run typecheck (pnpm typecheck)
        type: boolean
        default: true
      run-test:
        description: Run unit tests (pnpm test)
        type: boolean
        default: true
      run-build:
        description: Run build (pnpm build)
        type: boolean
        default: true
      run-integration:
        description: Run integration tests (pnpm test:integration)
        type: boolean
        default: false
      integration-artifact-pattern:
        description: Glob pattern for integration test artifacts to upload
        type: string
        default: ""
      docker-smoke-test:
        description: Run a Docker build smoke test (no push)
        type: boolean
        default: false
      docker-image:
        description: Image name for Docker smoke test
        type: string
        default: "app:ci"

jobs:
  ci:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest

    steps:
      - name: Setup Node.js + pnpm
        uses: codefuturist/shared-workflows/actions/setup-node-pnpm@v1
        with:
          node-version: ${{ inputs.node-version }}

      - name: Typecheck
        if: inputs.run-typecheck
        run: pnpm typecheck

      - name: Lint & format
        if: inputs.run-lint
        run: pnpm check

      - name: Test
        if: inputs.run-test
        run: pnpm test

      - name: Build
        if: inputs.run-build
        run: pnpm build

  integration:
    name: Integration Tests
    if: inputs.run-integration
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Setup Node.js + pnpm
        uses: codefuturist/shared-workflows/actions/setup-node-pnpm@v1
        with:
          node-version: ${{ inputs.node-version }}

      - name: Integration tests
        run: pnpm test:integration

      - name: Upload test reports
        if: always() && inputs.integration-artifact-pattern != ''
        uses: actions/upload-artifact@v6
        with:
          name: integration-reports
          path: ${{ inputs.integration-artifact-pattern }}
          retention-days: 14

  docker:
    name: Docker Build (smoke test)
    if: inputs.docker-smoke-test
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ${{ inputs.docker-image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
